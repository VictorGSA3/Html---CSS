<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes com google fonts</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap');

        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Shadows+Into+Light&display=swap');

        h1, h2 {font-family:  "Shadows Into Light", cursive; ;
        font-size: 4em;

        }

        p {
            font-family: "Oswald", sans-serif;;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Iusto sit molestias atque doloribus, illum vero earum nulla fuga voluptas asperiores cumque esse, iure aspernatur dolor expedita. Nostrum porro autem blanditiis.</p>
</body>
</html>
